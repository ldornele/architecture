config:
  # Disable line length limit - documentation files often have long lines
  MD013: false
  # Allow duplicate headings in different sections
  MD024:
    siblings_only: true
  # Allow specific HTML elements commonly used in documentation
  MD033:
    allowed_elements:
      - details
      - summary
      - br
      - b
      - strong
      - code
      - a
      - sup
      - sub
      - img
      - kbd
      - svc
  # Disable table column style - no style option allows mixed separators within a table
  MD060: false
